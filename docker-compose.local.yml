services:
  postgres:
    image: postgres:17-alpine
    container_name: gonguham-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gonguham
      POSTGRES_USER: gonguham
      POSTGRES_PASSWORD: gonguham
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gonguham -d gonguham"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - gonguham-postgres-data:/var/lib/postgresql/data

volumes:
  gonguham-postgres-data:
